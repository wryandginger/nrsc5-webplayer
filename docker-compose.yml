version: '3.8'

services:
  nrsc5-webplayer:
    build: .
    container_name: nrsc5-webplayer
    privileged: true
    ports:
      - "7430:7430"
    devices:
      - /dev:/dev
      - /run/udev:/run/udev:ro
    environment:
      - TZ=UTC
      - UDEV=1
    device_cgroup_rules:
      - 'c *:* rwm'
    network_mode: "bridge"
    restart: unless-stopped
    stdin_open: true  
    tty: true         
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'OUTPUT=$(nrsc5 99.9 0 -o /dev/null 2>&1 || true); if echo \"$OUTPUT\" | grep -q \"usb_open error\"; then exit 1; fi; exit 0'"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 10s   
